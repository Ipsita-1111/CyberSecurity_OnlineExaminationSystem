{% extends 'base.html' %}
{% block content %}

<h2>📝 Welcome, {{ user.username }}!</h2>
<p class="text-muted">Available Exams</p>

{% if exams %}
    {% for exam in exams %}
    <div class="card mb-3 shadow-sm">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h5 class="mb-0">{{ exam.title }}</h5>
                <small class="text-muted">{{ exam.questions|length }} questions</small>
            </div>
            <a href="{{ url_for('student.take_exam', exam_id=exam.id) }}"
               class="btn btn-success">Start Exam →</a>
        </div>
    </div>
    {% endfor %}
{% else %}
    <div class="alert alert-info">No exams available right now.</div>
{% endif %}

{% endblock %}
