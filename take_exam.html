{% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>📝 {{ exam.title }}</h2>
    <div class="badge bg-danger fs-6" id="timer">⏱ 30:00</div>
</div>

<form method="POST">
    {% for q in questions %}
    <div class="card mb-3 shadow-sm">
        <div class="card-body">
            <h6>Q{{ loop.index }}: {{ q.question_text }}</h6>
            <div class="mt-2">
                {% for opt, label in [('A', q.option_a), ('B', q.option_b),
                                      ('C', q.option_c), ('D', q.option_d)] %}
                <div class="form-check">
                    <input class="form-check-input" type="radio"
                           name="q_{{ q.id }}" value="{{ opt }}" required>
                    <label class="form-check-label">{{ opt }}. {{ label }}</label>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
    {% endfor %}

    <button type="submit" class="btn btn-primary btn-lg w-100 mb-4">
        Submit Exam
    </button>
</form>

<script>
// Exam timer — auto-submits when time runs out
let mins = 30, secs = 0;
const timer = document.getElementById('timer');
const interval = setInterval(() => {
    secs--;
    if (secs < 0) { secs = 59; mins--; }
    if (mins < 0) {
        clearInterval(interval);
        document.querySelector('form').submit(); // Auto-submit
        return;
    }
    timer.textContent = `⏱ ${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    if (mins < 5) timer.classList.add('bg-warning');
    if (mins < 1) timer.classList.replace('bg-warning','bg-danger');
}, 1000);
</script>

{% endblock %}
